services:
  - type: web
    name: bolsillo-claro-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://bolsillo-claro.vercel.app
      - key: ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: GIN_MODE
        value: release
      - key: FRONTEND_URL
        value: https://bolsillo-claro.vercel.app
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
